<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/flowbite@latest/dist/flowbite.min.js"></script>
    <title>Boissons </title>
</head>
<body class="bg-black text-white">

<section class="h-screen flex items-center justify-center">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 px-4">
    
    <!-- Box 1 : Boissons chaudes -->
    <div class="bg-white/50 p-6 rounded-xl text-black">
      <h2 class="text-2xl font-bold mb-4 text-center">Boissons chaudes</h2>
      <ul class="list-disc list-inside space-y-2">
        <li>Café {presse / au lait}</li>
        <li>Lait chaud</li>
        <li>Chocolat {au lait / chaud / nutella}</li>
        <li>Thé</li>
      </ul>
    </div>

    <!-- Box 2 : Boissons froides -->
    <div class="bg-white/50 p-6 rounded-xl text-black">
      <h2 class="text-2xl font-bold mb-4 text-center">Cafe</h2>
      <ul class="list-disc list-inside space-y-2">
        <li>Nesspresso</li>
        <li>Illy</li>
        <li>Lavazza</li>
        <li>Lor /Caps /Davidoff</li>
        <li>Iced Coffee/Tea</li>
      </ul>
    </div>

    <!-- Box 3 : Pâtisseries -->
    <div class="bg-white/50 p-6 rounded-xl text-black">
      <h2 class="text-2xl font-bold mb-4 text-center">Pâtisseries</h2>
      <ul class="list-disc list-inside space-y-2">
        <li>Croissant</li>
        <li>Muffin</li>
        <li>Tarte au chocolat</li>
        <li>Éclair</li>
      </ul>
    </div>

  </div>
</section>


</body>
</html>
